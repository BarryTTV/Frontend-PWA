<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PELIS+</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#e50914" />

    <link rel="stylesheet" href="css/base/reset.css" />
    <link rel="stylesheet" href="css/base/variables.css" />
    <link rel="stylesheet" href="css/base/global.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/chatbot.css" />

    <!-- Stripe -->
    <script src="https://js.stripe.com/v3/"></script>

    <style>
      .payment-section {
        background: #111;
        padding: 20px;
        margin: 30px;
        border-radius: 10px;
        color: white;
      }

      #payment-form {
        margin-top: 15px;
      }

      #submit {
        margin-top: 15px;
        padding: 10px 20px;
        background: #e50914;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 6px;
      }

      #submit:hover {
        background: #b20710;
      }

      #error-message {
        margin-top: 10px;
        color: #ff4d4d;
      }

      #success-message {
        margin-top: 10px;
        color: #4dff88;
      }
    </style>
  </head>

  <body>
    <header class="header">
      <div class="header__logo">PELIS+</div>

      <nav class="header__nav">
        <a class="header__link header__link--active" href="index.html"
          >Inicio</a
        >
        <a class="header__link" href="playlist.html">Playlist</a>
        <a class="header__link" href="add-movie.html">Agregar</a>
      </nav>

      <div class="header__actions">
        <input
          type="text"
          class="header__search"
          placeholder="Buscar película"
        />
        <div class="header__profile">👤</div>
      </div>
    </header>

    <section class="categories">
      <button class="categories__item categories__item--active">
        Películas
      </button>
      <button class="categories__item">Series</button>
      <button class="categories__item">Trailers</button>
      <button class="categories__item">WebTV</button>
    </section>

    <main class="movies"></main>

    <!-- 🔥 SECCIÓN PREMIUM -->
    <section class="payment-section">
      <h2>Suscripción Premium 🎬</h2>
      <p>Desbloquea funciones exclusivas por $5 USD</p>

      <form id="payment-form">
        <div id="payment-element"></div>
        <button id="submit">Pagar $5 USD</button>
        <div id="error-message"></div>
        <div id="success-message"></div>
      </form>
    </section>

    <!-- Chatbot -->
    <div class="chatbot">
      <button class="chatbot__toggle">💬</button>

      <div class="chatbot__window">
        <div class="chatbot__messages" id="chatMessages"></div>

        <form class="chatbot__form" id="chatForm">
          <input
            type="text"
            id="chatInput"
            placeholder="Escribe un mensaje..."
            autocomplete="off"
            required
          />
          <button type="submit">Enviar</button>
        </form>
      </div>
    </div>

    <!-- Tus scripts -->
    <script src="js/home.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/payment.js"></script>

    <!-- Service Worker desactivado temporalmente -->
    <!--
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(() => console.log("Service Worker registrado"))
        .catch((err) => console.error("SW error", err));
    }
    -->
  </body>
</html>
